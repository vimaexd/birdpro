name: Build Bird Pro

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    build-linux:
        runs-on: docker-amd64
        container:
            image: ghcr.io/catthehacker/ubuntu:act-22.04

        steps:
            - name: checkout
              uses: actions/checkout@v4
              with:
                  submodules: recursive

            # tauri requirements as of https://v2.tauri.app/start/prerequisites/#linux
            - name: install system dependencies
              run: |
                  apt update
                  apt install -y libwebkit2gtk-4.1-dev \
                    build-essential \
                    curl \
                    wget \
                    file \
                    libxdo-dev \
                    libssl-dev \
                    libayatana-appindicator3-dev \
                    librsvg2-dev \
                    libasound2-dev \
                    libpulse-dev \
                    libjack-dev \
                    libclang-dev \
                    libespeak-ng-dev \
                    cmake \
                    xdg-utils

            - name: install rust
              run: |
                  curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
                  echo "$HOME/.cargo/bin" >> $FORGEJO_PATH
                  source "$HOME/.cargo/env"
                  rustup show

            - name: install bun
              run: |
                  curl -fsSL https://bun.sh/install | bash
                  echo "$HOME/.bun/bin" >> $FORGEJO_PATH

            - name: install js dependencies
              run: bun ci

            - name: build bird pro
              run: |
                  source "$HOME/.cargo/env"
                  bunx tauri build

            - name: upload artifact
              uses: forgejo/upload-artifact@v4
              with:
                  name: birdpro-linux-${{ env.FORGEJO_SHA }}
                  path: |
                      src-tauri/target/release/bundle/appimage/*.AppImage
                      src-tauri/target/release/birdpro
                  if-no-files-found: warn
                  retention-days: 90
    build-win:
        runs-on: docker-amd64
        container:
            image: ghcr.io/catthehacker/ubuntu:act-22.04

        steps:
            - name: checkout
              uses: actions/checkout@v4
              with:
                  submodules: recursive

            # tauri requirements as of https://v2.tauri.app/start/prerequisites/#linux
            - name: install system dependencies
              run: |
                  apt update
                  apt install -y libwebkit2gtk-4.1-dev \
                    build-essential \
                    curl \
                    wget \
                    file \
                    libxdo-dev \
                    libssl-dev \
                    libayatana-appindicator3-dev \
                    librsvg2-dev \
                    libasound2-dev \
                    libpulse-dev \
                    libjack-dev \
                    libespeak-ng-dev \
                    libclang-dev \
                    xdg-utils \
                    nsis \
                    lld \
                    llvm \
                    cmake \
                    ninja-build \

            - name: install clang 19
              run: |
                  wget https://apt.llvm.org/llvm.sh
                  chmod +x llvm.sh
                  ./llvm.sh 19
                  apt install -y clang-19 lld-19 llvm-19
                  update-alternatives --install /usr/bin/clang clang /usr/bin/clang-19 100
                  update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-19 100
                  update-alternatives --install /usr/bin/clang-cl clang-cl /usr/bin/clang-cl-19 100

            - name: install rust
              run: |
                  curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
                  echo "$HOME/.cargo/bin" >> $FORGEJO_PATH
                  source "$HOME/.cargo/env"
                  rustup show

            - name: install rustup target & cargo-xwin
              run: |
                  source "$HOME/.cargo/env"
                  rustup target add x86_64-pc-windows-msvc
                  cargo install --locked cargo-xwin
                  echo "XWIN_CLANG_CL=$(which clang-cl)" >> $FORGEJO_ENV

            - name: install bun
              run: |
                  curl -fsSL https://bun.sh/install | bash
                  echo "$HOME/.bun/bin" >> $FORGEJO_PATH

            - name: install js dependencies
              run: bun ci

            - name: build bird pro
              run: |
                  source "$HOME/.cargo/env"
                  bunx tauri build --runner cargo-xwin --target x86_64-pc-windows-msvc

            - name: upload artifact
              uses: forgejo/upload-artifact@v4
              with:
                  name: birdpro-win-${{ env.FORGEJO_SHA }}
                  path: |
                      src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
                  if-no-files-found: warn
                  retention-days: 90
